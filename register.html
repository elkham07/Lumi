<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Lumi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .register-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
      background: linear-gradient(rgba(15, 15, 15, 0.8), rgba(15, 15, 15, 0.8)), url('1683747988_background-size1920x1080-4e1694a6-75aa-4c36-9d4d-7fb6a3102005-bc5318781aad7f5c8520.jpg');
      background-size: cover;
      background-position: center;
    }

    .register-card {
      background: var(--glass);
      backdrop-filter: blur(var(--blur));
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .register-card h2 {
      font-size: 2.25rem;
      margin-bottom: 2rem;
      text-align: center;
      color: var(--text-main);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: white;
      font-family: inherit;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-primary,
    .btn-secondary {
      flex: 1;
      padding: 1rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .footer-link {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>

<body>
  <nav>
    <div class="logo">Lumi</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="Movies.html">Movies</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-right">
      <button class="login-btn" onclick="window.location.href='index.html'">Back Home</button>
    </div>
  </nav>

  <main class="register-container">
    <div class="register-card">
      <h2>Sign Up</h2>
      <form id="registrationForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm</label>
            <input type="password" id="confirmPassword" required>
          </div>
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <select id="country" required>
            <option value="">Select your country</option>
            <option>Kazakhstan</option>
            <option>USA</option>
            <option>UK</option>
            <option>Germany</option>
            <option>Japan</option>
          </select>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn-primary">Create Account</button>
          <button type="reset" class="btn-secondary">Reset</button>
        </div>

        <p class="footer-link">Already have an account? <a href="#">Sign In</a></p>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('registrationForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        alert("Passwords do not match!");
        return;
      }

      alert("Registration successful! (Demo only)");
      window.location.href = 'index.html';
    });
  </script>
</body>

</html>
